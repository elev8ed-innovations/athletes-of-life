name: Athletes of Life CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: athletes-of-life-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate site and functions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check required site files
        run: |
          test -f index.html
          test -f audit/index.html
          test -f netlify.toml

      - name: Check Netlify function syntax
        run: |
          node --check netlify/functions/send-audit.js
          node --check netlify/functions/send-contact.js

  secrets-scan:
    name: Scan for exposed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Scan repository history
        uses: trufflesecurity/trufflehog@8708801319700a16c56abb86628803ba766d5563
        with:
          extra_args: --results=verified,unknown --fail
